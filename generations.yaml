generations:
  - name: "First Generation"
    start_year: 2022
    end_year: 2024
    description: "The Toyota GR Corolla represents the first high-performance variant of the Corolla developed by Toyota's Gazoo Racing division for the North American market, bringing serious performance credentials to the traditionally practical compact car. Based on the twelfth-generation Corolla hatchback but with substantial performance modifications, the GR Corolla features aggressive styling with widened fenders, functional air vents, a large rear wing, and triple exhaust outlets—visual clues to its performance-focused nature. Powered by a turbocharged 1.6-liter three-cylinder G16E-GTS engine producing 300 horsepower and 273 lb-ft of torque, the GR Corolla delivers impressive performance with a 0-60 mph time of approximately 5.0 seconds. A defining feature is the GR-FOUR all-wheel drive system offering three driver-selectable torque distribution settings (60:40, 50:50, or 30:70 front-to-rear), paired exclusively with a six-speed manual transmission featuring rev-matching functionality. The chassis features significant reinforcement with additional welds and structural adhesive, while the suspension has been completely retuned with unique springs, dampers, and stabilizer bars for optimized handling. Available in Core, Circuit Edition (2023 only), and limited-production Morizo Edition variants, the latter featuring increased torque (295 lb-ft), reduced weight, and additional chassis reinforcement. The interior combines the standard Corolla's basic layout with sport-specific enhancements including heavily bolstered front seats, a GR-specific steering wheel and shifter, and unique instrumentation including all-wheel drive mode indicators. Standard features include Toyota Safety Sense 3.0 driver assistance suite."
  - name: "First Generation (Facelift)"
    start_year: 2025
    end_year: null
    description: "The facelifted GR Corolla was revealed on August 1, 2024, for the 2025 model year. The most significant change is the addition of an 8-speed Direct Automatic Transmission (DAT) option with Formula One-style paddle-shifters for semi-automatic mode, marking the first automatic transmission available in the GR Corolla. All trims now produce increased torque and come with front and rear Torsen limited-slip differentials standard. The restyled front bumper was designed for better cooling and aerodynamics, with a sub-radiator standard on Premium Plus or optional on Premium models. The transmission fluid cooler for the 8-speed DAT is housed in the left-hand side of the bumper. US market model grades are Core, Premium, and Premium Plus—with the Premium Plus featuring the forged carbon roof, hood bulge with vents, and sub-radiator as a successor to the Circuit Edition. The interior received upgrades including suede-trimmed upholstery, heated seats and steering wheel, and JBL Premium sound system on higher trims."